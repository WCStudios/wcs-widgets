<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Followers</title>
<style>
:root{--card:#fff;--line:#e6e6e6;--text:#111;--muted:#888;--accent:#e8622c;--blue:#3b82f6;--soft:#f6f6f6}
@media (prefers-color-scheme:dark){:root{--card:#191919;--line:#2a2a2a;--text:#f4f4f4;--muted:#8a8a8a;--soft:#232323}}
*{margin:0;box-sizing:border-box}html,body{background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--text)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 24px;margin:12px;cursor:pointer;user-select:none;position:relative;transition:transform .12s}
.card:active{transform:scale(.99)}
.top{display:flex;align-items:center;gap:14px}
.av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;background:var(--soft)}
.h{font-size:15px;font-weight:700}.s{font-size:12px;color:var(--muted);margin-top:2px}
.big{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1;margin-top:18px}
.lab{font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-top:6px}
.row{display:flex;gap:26px;margin-top:14px}.n{font-size:16px;font-weight:700}.nl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.hint{position:absolute;top:14px;right:16px;font-size:10px;color:var(--muted)}
.dots{display:flex;gap:5px;margin-top:16px}.d{width:6px;height:6px;border-radius:50%;background:var(--line)}.d.on{background:var(--accent)}
</style></head>
<body>
<div class="card" id="card" onclick="cycle()">
  <div class="hint" id="hint"></div>
  <div class="top"><div class="av" id="av">–</div><div><div class="h" id="handle">@…</div><div class="s" id="sub">loading…</div></div></div>
  <div class="big" id="followers">—</div><div class="lab">Followers</div>
  <div class="row"><div><div class="n" id="posts">—</div><div class="nl">Posts</div></div><div><div class="n" id="following">—</div><div class="nl">Following</div></div></div>
  <div class="dots" id="dots"></div>
</div>
<script>
const FEED="https://raw.githubusercontent.com/WCStudios/wcs-widgets/main/ig-stats.json";
const META={"wcstudios.co":{av:"W",c:"#e8622c",sub:"WCStudios"},"lifeofbennyy":{av:"B",c:"#3b82f6",sub:"Personal"}};
let data=null,accts=[],i=0;
const fmt=n=>Number(n||0).toLocaleString("en-US");
function render(){if(!data)return;const a=accts[i],d=data[a]||{},m=META[a]||{av:a[0].toUpperCase(),c:"#e8622c",sub:""};
 document.getElementById('av').textContent=m.av;document.getElementById('av').style.color=m.c;
 document.getElementById('handle').textContent="@"+a;document.getElementById('sub').textContent=m.sub;
 document.getElementById('followers').textContent=fmt(d.followers);document.getElementById('posts').textContent=fmt(d.mediaCount);
 document.getElementById('following').textContent=fmt(d.following);
 document.getElementById('hint').textContent=accts.length>1?"tap to switch ▸":"";
 document.getElementById('dots').innerHTML=accts.map((_,x)=>'<div class="d '+(x===i?'on':'')+'"></div>').join('');}
function cycle(){if(accts.length>1){i=(i+1)%accts.length;render();}}
function load(){fetch(FEED+"?t="+Date.now()).then(r=>r.json()).then(d=>{data=d;accts=d.accounts||Object.keys(d).filter(k=>d[k]&&d[k].followers!=null);render();}).catch(()=>{});}
load();setInterval(load,300000);
</script></body></html>
