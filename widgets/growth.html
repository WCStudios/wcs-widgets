<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Growth</title>
<style>
:root{--card:#fff;--line:#e6e6e6;--text:#111;--muted:#8a8a8a;--accent:#e8622c;--up:#16a34a;--down:#dc2626;--soft:#efefef}
@media (prefers-color-scheme:dark){:root{--card:#191919;--line:#2a2a2a;--text:#f4f4f4;--muted:#8a8a8a;--soft:#2b2b2b}}
*{margin:0;box-sizing:border-box}html,body{height:100%}
body{background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--text);display:flex;padding:8px}
.card{flex:1;display:flex;flex-direction:column;justify-content:center;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:clamp(18px,4vw,32px);user-select:none;position:relative}
.who{font-size:clamp(12px,2.4vw,15px);font-weight:700}
.range{display:flex;gap:6px;margin:12px 0 4px;flex-wrap:wrap}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;background:var(--soft);color:var(--muted);cursor:pointer}
.chip.on{background:var(--accent);color:#fff}
.big{font-size:clamp(30px,7vw,48px);font-weight:800;letter-spacing:-1px;line-height:1;margin-top:10px}
.delta{font-size:clamp(12px,2.4vw,15px);font-weight:700;margin-top:8px}.delta.up{color:var(--up)}.delta.down{color:var(--down)}.delta.flat{color:var(--muted)}
.spark{flex:0 0 auto;height:clamp(40px,9vw,70px);margin-top:14px}
.foot{font-size:11px;color:var(--muted);margin-top:8px}
.switch{position:absolute;top:14px;right:18px;font-size:10px;color:var(--muted);cursor:pointer}
</style></head><body>
<div class="card" id="card">
  <div class="switch" id="switch" onclick="cycleAcct()"></div>
  <div class="who" id="who">@…</div>
  <div class="range" id="range"></div>
  <div class="big" id="followers">—</div>
  <div class="delta flat" id="delta">loading…</div>
  <svg class="spark" id="spark" width="100%" viewBox="0 0 300 60" preserveAspectRatio="none"></svg>
  <div class="foot" id="foot"></div>
</div>
<script>
const JSSRC="https://wcstudios.github.io/wcs-widgets/ig-stats.js";
const RANGES=[30,60,90,365],LBL={30:"30d",60:"60d",90:"90d",365:"1y"};
let data=null,accts=[],ai=0,ri=0;
const fmt=n=>Number(n||0).toLocaleString("en-US");
function render(){if(!data)return;const a=accts[ai],d=data[a]||{};
 who.textContent="@"+a;followers.textContent=fmt(d.followers);
 range.innerHTML=RANGES.map((r,x)=>'<span class="chip '+(x===ri?'on':'')+'" onclick="setR('+x+')">'+LBL[r]+'</span>').join('');
 const g=(d.growth||{})[String(RANGES[ri])];
 if(g==null){delta.className="delta flat";delta.textContent="Collecting data — builds daily";}
 else{const s=g>0?"+":"";delta.className="delta "+(g>0?"up":g<0?"down":"flat");delta.textContent=s+fmt(g)+" in "+LBL[RANGES[ri]];}
 const hist=(d.history||[]).slice(),cut=Date.now()-RANGES[ri]*86400000,pts=hist.filter(h=>new Date(h.date).getTime()>=cut);
 if(pts.length>1){const ys=pts.map(p=>p.followers),mn=Math.min(...ys),mx=Math.max(...ys),rng=mx-mn||1;
   const path=pts.map((p,x)=>{const px=(x/(pts.length-1))*300,py=60-((p.followers-mn)/rng)*54-3;return (x?"L":"M")+px.toFixed(1)+" "+py.toFixed(1);}).join(" ");
   spark.innerHTML='<path d="'+path+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';}
 else spark.innerHTML='';
 foot.textContent=pts.length>1?(pts.length+" daily snapshots"):"Trend appears as daily snapshots build";
 switchEl.textContent=accts.length>1?"switch ▸":"";}
const switchEl=document.getElementById('switch');
function setR(x){ri=x;render();}
function cycleAcct(){if(accts.length>1){ai=(ai+1)%accts.length;render();}}
function apply(d){if(!d)return;data=d;accts=(d.accounts||Object.keys(d).filter(k=>d[k]&&d[k].followers!=null));render();}
function load(){const s=document.createElement('script');s.src=JSSRC+"?t="+Date.now();s.onload=()=>{apply(window.IGDATA);s.remove();};s.onerror=()=>{delta.textContent="feed offline";s.remove();};document.head.appendChild(s);}
load();setInterval(load,300000);
</script></body></html>
