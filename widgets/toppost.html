<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Top Post</title>
<style>
:root{--card:#fff;--line:#e6e6e6;--text:#111;--muted:#8a8a8a;--accent:#e8622c;--soft:#efefef}
@media (prefers-color-scheme:dark){:root{--card:#191919;--line:#2a2a2a;--text:#f4f4f4;--muted:#8a8a8a;--soft:#2b2b2b}}
*{margin:0;box-sizing:border-box}html,body{height:100%}
body{background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--text);display:flex;padding:8px}
.card{flex:1;display:flex;gap:clamp(14px,3vw,22px);align-items:center;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:clamp(14px,3vw,22px);user-select:none;position:relative;cursor:pointer}
.thumb{width:clamp(80px,22%,150px);aspect-ratio:1;border-radius:14px;object-fit:cover;background:var(--soft);flex:0 0 auto}
.body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.lab{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
.who{font-size:clamp(12px,2.4vw,15px);font-weight:700;margin-top:2px}
.cap{font-size:clamp(12px,2.3vw,15px);margin-top:8px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.stats{display:flex;gap:clamp(18px,5vw,40px);margin-top:clamp(10px,2.5vw,16px)}
.st{font-size:clamp(15px,3.2vw,24px);font-weight:800}.st small{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-top:2px}
.switch{position:absolute;top:12px;right:16px;font-size:10px;color:var(--muted);cursor:pointer}
</style></head><body>
<div class="card" id="card">
  <div class="switch" id="switch" onclick="cycle(event)"></div>
  <img class="thumb" id="thumb" alt="" referrerpolicy="no-referrer">
  <div class="body">
    <div class="lab">Top recent post</div>
    <div class="who" id="who">@…</div>
    <div class="cap" id="cap">loading…</div>
    <div class="stats">
      <div class="st" id="likes">—<small>Likes</small></div>
      <div class="st" id="comments">—<small>Comments</small></div>
    </div>
  </div>
</div>
<script>
const FEED="https://wcstudios.github.io/wcs-widgets/ig-stats.json";
let data=null,accts=[],i=0;
const fmt=n=>Number(n||0).toLocaleString("en-US");
function render(){if(!data)return;const a=accts[i],d=data[a]||{},t=d.topPost;
 who.textContent="@"+a;switchEl.textContent=accts.length>1?"switch ▸":"";
 if(!t){cap.textContent="No recent posts";thumb.style.display="none";likes.innerHTML="—<small>Likes</small>";comments.innerHTML="—<small>Comments</small>";return;}
 if(t.thumb){thumb.src=t.thumb;thumb.style.display="";}else thumb.style.display="none";
 cap.textContent=t.caption||"(no caption)";
 likes.innerHTML=fmt(t.likes)+"<small>Likes</small>";comments.innerHTML=fmt(t.comments)+"<small>Comments</small>";}
const switchEl=document.getElementById('switch');
function openPost(){const t=(data[accts[i]]||{}).topPost;if(t&&t.permalink)window.open(t.permalink,"_blank");}
function cycle(e){e&&e.stopPropagation();if(accts.length>1){i=(i+1)%accts.length;render();}}
document.getElementById('card').addEventListener('click',openPost);
function load(){fetch(FEED+"?t="+Date.now(),{cache:"no-store"}).then(r=>r.json()).then(d=>{data=d;accts=(d.accounts||Object.keys(d).filter(k=>d[k]&&d[k].followers!=null));render();}).catch(e=>{cap.textContent="feed error";});}
load();setInterval(load,300000);
</script></body></html>
