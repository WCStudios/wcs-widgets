<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>IG Grid Planner</title>
<style>
:root{--bg:#fff;--line:#ececec;--text:#111;--muted:#8a8a8a;--accent:#e8622c;--soft:#f0f0f0;--drop:#e8622c}
@media (prefers-color-scheme:dark){:root{--bg:#171717;--line:#2a2a2a;--text:#f4f4f4;--muted:#8a8a8a;--soft:#262626}}
*{margin:0;box-sizing:border-box}html,body{height:100%;width:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--text)}
.wrap{height:100%;display:flex;flex-direction:column}
.head{display:flex;align-items:center;gap:12px;cursor:pointer;position:relative;padding:clamp(12px,2vw,16px) clamp(12px,2vw,16px) 10px}
.pic{width:clamp(40px,7vw,54px);aspect-ratio:1;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);border:2px solid var(--line);flex:0 0 auto;background-size:cover;background-position:center}
.handle{font-size:clamp(14px,2.4vw,17px);font-weight:700}
.meta{font-size:11px;color:var(--muted);margin-top:2px}
.meta b{color:var(--text)}
.hint{position:absolute;top:8px;right:12px;font-size:10px;color:var(--muted)}
.tabs{display:flex;gap:20px;justify-content:center;border-top:1px solid var(--line);margin:0 clamp(12px,2vw,16px);padding-top:9px;font-size:10.5px;letter-spacing:1px;color:var(--muted)}
.tabs .on{color:var(--text);font-weight:700;border-top:2px solid var(--text);margin-top:-10px;padding-top:9px}
.scroll{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;align-content:start;grid-auto-rows:max-content;padding:1px 0 4px;scrollbar-width:thin;scrollbar-color:transparent transparent}
.scroll.scrolling{scrollbar-color:rgba(150,150,150,.5) transparent}
.scroll::-webkit-scrollbar{width:8px}
.scroll::-webkit-scrollbar-track{background:transparent}
.scroll::-webkit-scrollbar-thumb{background:transparent;border-radius:8px;border:2px solid transparent;background-clip:content-box}
.scroll.scrolling::-webkit-scrollbar-thumb{background:rgba(150,150,150,.55);background-clip:content-box}
.scroll::-webkit-scrollbar-thumb:hover{background:rgba(150,150,150,.8);background-clip:content-box}
.cell{position:relative;overflow:hidden;background:var(--soft);cursor:grab;height:120px}
.cell.drag{opacity:.35}
.cell.over{outline:2px solid var(--drop);outline-offset:-2px;z-index:5}
.cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.badge{position:absolute;top:6px;left:6px;z-index:3;background:rgba(0,0,0,.72);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;padding:0 5px;border-radius:11px;display:flex;align-items:center;justify-content:center;pointer-events:none}
.tag{position:absolute;top:6px;right:6px;z-index:3;background:rgba(232,98,44,.9);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;pointer-events:none}
.sched{position:absolute;bottom:6px;right:6px;z-index:4;background:rgba(0,0,0,.62);color:#a9d8ff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;pointer-events:none;display:flex;align-items:center;gap:3px}
.rlabel{position:absolute;bottom:6px;left:6px;right:44px;z-index:3;background:rgba(0,0,0,.62);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity .12s;pointer-events:none}
.cell:hover .rlabel{opacity:1}
.moves{position:absolute;top:6px;right:6px;z-index:4;display:flex;flex-direction:column;gap:3px;opacity:0;transition:opacity .12s}
.cell:hover .moves{opacity:1}
.mv{width:22px;height:20px;border:none;border-radius:6px;background:rgba(0,0,0,.72);color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mv:hover{background:var(--accent)}.mv:disabled{opacity:.3;cursor:default}
.foot{border-top:1px solid var(--line);padding:9px clamp(12px,2vw,16px);display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted)}
.foot .grow{flex:1}
.btn{border:1px solid var(--line);background:var(--soft);color:var(--text);font-size:11px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
.empty{grid-column:1/4;color:var(--muted);font-size:13px;text-align:center;padding:40px 20px}
.divider{grid-column:1/4;font-size:9.5px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;font-weight:700;padding:13px 6px 7px;border-top:1px solid var(--line);margin-top:4px}
.cell.live{cursor:default}
.cell.live .plabel{position:absolute;top:6px;left:6px;z-index:3;background:rgba(0,0,0,.55);color:#8fe3a0;font-size:8.5px;font-weight:700;padding:2px 5px;border-radius:5px;pointer-events:none;letter-spacing:.5px}
.toast{position:absolute;left:50%;bottom:52px;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:11px;font-weight:700;padding:7px 14px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9}
.toast.show{opacity:1}
</style></head><body>
<div class="wrap">
  <div class="head" id="head" onclick="cycle()">
    <div class="hint" id="hint"></div>
    <div class="pic" id="pic">–</div>
    <div>
      <div class="handle" id="handle">@…</div>
      <div class="meta" id="meta">loading…</div>
    </div>
  </div>
  <div class="tabs"><span class="on">GRID PLANNER</span><span>DRAFTS</span></div>
  <div class="scroll" id="scroll"></div>
  <div class="foot">
    <span class="grow" id="status">Drag a post to reorder · 1 = bottom, newest on top</span>
    <button class="btn" id="resetBtn" onclick="resetOrder()">Reset</button>
    <button class="btn p" id="copyBtn" onclick="copyOrder()">Copy order</button>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
const JSSRC="https://wcstudios.github.io/wcs-widgets/draft-grid.js";
const STATSSRC="https://wcstudios.github.io/wcs-widgets/ig-stats.js";
const ACCTS=["wcstudios.co","lifeofbennyy"];
const INIT={"wcstudios.co":"W","lifeofbennyy":"B"};
let raw=null, acct=0, rows=[]; // rows = posts (each may be grid[3] or single[1]) top→bottom
const $=id=>document.getElementById(id);
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1400);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtDate(s){try{return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(_){return '';}}
function sizeCells(){requestAnimationFrame(()=>{document.querySelectorAll('#scroll .cell').forEach(c=>{const w=c.clientWidth;if(w)c.style.height=Math.round(w*1.25)+'px';});});}
let _ro;function watchResize(){if(_ro)return;try{_ro=new ResizeObserver(()=>sizeCells());_ro.observe($('scroll'));}catch(_){window.addEventListener('resize',sizeCells);}}

function itemsFor(a){return ((raw&&raw.items)||[]).filter(x=>(x.account||"wcstudios.co")===a);}

function render(){
  const a=ACCTS[acct];
  const pic=$('pic');
  const pp=(window.IGDATA&&window.IGDATA[a]&&window.IGDATA[a].profilePic)||null;
  if(pp){pic.style.backgroundImage="url('"+pp+"')";pic.textContent="";}
  else{pic.style.backgroundImage="";pic.textContent=INIT[a]||a[0].toUpperCase();}
  $('handle').textContent="@"+a;
  $('hint').textContent="tap to switch ▸";
  const n=rows.length;
  $('meta').innerHTML="<b>"+n+"</b> draft post"+(n===1?"":"s")+" &nbsp;·&nbsp; plan the feed";
  const sc=$('scroll');
  if(!n){sc.innerHTML='<div class="empty">No draft posts for this account.<br>Set a post to <b>IG Grid Post</b> or <b>IG Feed Post</b> and it’ll show here.</div>';return;}
  let html="";
  rows.forEach((it,pi)=>{
    const gnum=n-pi; // top = highest number (newest), bottom = 1
    const tiles=(it.tiles||[]);
    const cellsN=it.kind==='grid'?3:1;
    for(let k=0;k<cellsN;k++){
      const u=tiles[k];
      const first=(k===0);
      html+='<div class="cell" draggable="true" data-post="'+pi+'">'+
        (u?'<img src="'+u+'" referrerpolicy="no-referrer" alt="">':'')+
        (first?'<div class="badge">'+gnum+'</div>':'')+
        (first&&it.scheduleDate?'<div class="sched">⏱ '+fmtDate(it.scheduleDate)+'</div>':'')+
        (first&&it.kind==='grid'?'<div class="tag">GRID</div>':'')+
        (first?'<div class="rlabel">'+esc(it.title||'')+'</div>':'')+
        (first?'<div class="moves"><button class="mv" onclick="event.stopPropagation();move('+pi+',-1)" '+(pi===0?'disabled':'')+'>▲</button>'+
          '<button class="mv" onclick="event.stopPropagation();move('+pi+',1)" '+(pi===n-1?'disabled':'')+'>▼</button></div>':'')+
        '</div>';
    }
  });
  // Reference: your most recent posted posts (read-only) so you can plan drafts on top.
  const live=((window.IGDATA&&window.IGDATA[a]&&window.IGDATA[a].grid)||[]).filter(p=>p.productType!=='REELS').slice(0,9);
  if(live.length){
    html+='<div class="divider">↓ posted · your live feed</div>';
    live.forEach(p=>{
      html+='<div class="cell live">'+(p.thumb?'<img src="'+p.thumb+'" referrerpolicy="no-referrer" alt="">':'')+'<div class="plabel">LIVE</div></div>';
    });
  }
  sc.innerHTML=html;
  sizeCells();
  wireDrag();
  $('status').textContent="Drafts on top · scheduled sort by date · drag to override";
}

function move(pi,d){const j=pi+d;if(j<0||j>=rows.length)return;const t=rows[pi];rows[pi]=rows[j];rows[j]=t;persist();render();}

let dragPost=null;
function wireDrag(){
  [...document.querySelectorAll('#scroll .cell:not(.live)')].forEach(el=>{
    el.addEventListener('dragstart',e=>{dragPost=+el.dataset.post;el.classList.add('drag');try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','');}catch(_){}});
    el.addEventListener('dragend',()=>{dragPost=null;[...document.querySelectorAll('#scroll .cell')].forEach(c=>c.classList.remove('drag','over'));});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('over');});
    el.addEventListener('dragleave',()=>el.classList.remove('over'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('over');const to=+el.dataset.post;if(dragPost==null||dragPost===to)return;const it=rows.splice(dragPost,1)[0];rows.splice(to,0,it);persist();render();});
  });
}

function keyFor(a){return "wcsgrid:"+a;}
function persist(){try{localStorage.setItem(keyFor(ACCTS[acct]),JSON.stringify(rows.map(r=>r.pageId)));}catch(_){}}
function loadOrder(a){
  const base=itemsFor(a);
  let saved=null;try{saved=JSON.parse(localStorage.getItem(keyFor(a))||"null");}catch(_){}
  if(saved&&Array.isArray(saved)){
    const byId=Object.fromEntries(base.map(x=>[x.pageId,x]));
    const ordered=saved.map(id=>byId[id]).filter(Boolean);
    base.forEach(x=>{if(!saved.includes(x.pageId))ordered.unshift(x);});
    return ordered;
  }
  // Default: unscheduled drafts float to the top; scheduled posts sort by date
  // (later date higher). Scheduling a post to an earlier date drops it down.
  const key=p=>p.scheduleDate?new Date(p.scheduleDate).getTime():Number.POSITIVE_INFINITY;
  return base.slice().sort((x,y)=>{
    const kx=key(x),ky=key(y);
    if(kx!==ky)return ky-kx;
    return (y.order??0)-(x.order??0);
  });
}
function resetOrder(){try{localStorage.removeItem(keyFor(ACCTS[acct]));}catch(_){}rows=loadOrder(ACCTS[acct]);render();toast("Reset to saved order");}
function copyOrder(){
  const n=rows.length;
  const lines=rows.map((it,i)=>(n-i)+"  "+(it.title||it.pageId));
  const txt="Grid Order (top = newest):\n"+lines.join("\n");
  try{navigator.clipboard.writeText(txt);toast("Order copied");}catch(_){toast("Copy failed");}
}
function cycle(){acct=(acct+1)%ACCTS.length;rows=loadOrder(ACCTS[acct]);render();}

function apply(){rows=loadOrder(ACCTS[acct]);render();}
function loadStats(){const s=document.createElement('script');s.src=STATSSRC+"?t="+Date.now();s.onload=()=>{render();s.remove();};s.onerror=()=>s.remove();document.head.appendChild(s);}
function load(){const s=document.createElement('script');s.src=JSSRC+"?t="+Date.now();s.onload=()=>{raw=window.DRAFTGRID;apply();s.remove();};s.onerror=()=>{$('meta').textContent="feed offline";s.remove();};document.head.appendChild(s);}
function watchScroll(el){if(!el)return;el.addEventListener('scroll',()=>{el.classList.add('scrolling');clearTimeout(el._st);el._st=setTimeout(()=>el.classList.remove('scrolling'),900);});}
load();loadStats();watchResize();watchScroll($('scroll'));setInterval(()=>{load();loadStats();},300000);
</script></body></html>
