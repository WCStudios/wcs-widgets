<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>IG Grid Planner</title>
<style>
:root{--bg:#fff;--line:#ececec;--text:#111;--muted:#8a8a8a;--accent:#e8622c;--soft:#f0f0f0;--drop:#e8622c}
@media (prefers-color-scheme:dark){:root{--bg:#171717;--line:#2a2a2a;--text:#f4f4f4;--muted:#8a8a8a;--soft:#262626}}
*{margin:0;box-sizing:border-box}html,body{height:100%;width:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--text)}
.wrap{height:100%;display:flex;flex-direction:column}
.head{display:flex;align-items:center;gap:12px;cursor:pointer;position:relative;padding:clamp(12px,2vw,16px) clamp(12px,2vw,16px) 10px}
.pic{width:clamp(40px,7vw,54px);aspect-ratio:1;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);border:2px solid var(--line);flex:0 0 auto}
.handle{font-size:clamp(14px,2.4vw,17px);font-weight:700}
.meta{font-size:11px;color:var(--muted);margin-top:2px}
.hint{position:absolute;top:8px;right:12px;font-size:10px;color:var(--muted)}
.tabs{display:flex;gap:20px;justify-content:center;border-top:1px solid var(--line);margin:0 clamp(12px,2vw,16px);padding-top:9px;font-size:10.5px;letter-spacing:1px;color:var(--muted)}
.tabs .on{color:var(--text);font-weight:700;border-top:2px solid var(--text);margin-top:-10px;padding-top:9px}
.scroll{flex:1;overflow-y:auto;padding:10px 0 4px}
.row{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;cursor:grab;transition:opacity .12s,transform .12s}
.row+.row{margin-top:1px}
.row.drag{opacity:.4;cursor:grabbing}
.row.over{outline:2px solid var(--drop);outline-offset:-2px}
.cell{position:relative;overflow:hidden;background:var(--soft);height:120px}
.cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.badge{position:absolute;top:6px;left:6px;z-index:3;background:rgba(0,0,0,.72);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;padding:0 5px;border-radius:11px;display:flex;align-items:center;justify-content:center;pointer-events:none}
.rlabel{position:absolute;bottom:6px;left:6px;right:44px;z-index:3;background:rgba(0,0,0,.62);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity .12s;pointer-events:none}
.row:hover .rlabel{opacity:1}
.moves{position:absolute;top:6px;right:6px;z-index:4;display:flex;flex-direction:column;gap:3px;opacity:0;transition:opacity .12s}
.row:hover .moves{opacity:1}
.mv{width:22px;height:20px;border:none;border-radius:6px;background:rgba(0,0,0,.72);color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mv:hover{background:var(--accent)}.mv:disabled{opacity:.3;cursor:default}
.foot{border-top:1px solid var(--line);padding:9px clamp(12px,2vw,16px);display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted)}
.foot .grow{flex:1}
.btn{border:1px solid var(--line);background:var(--soft);color:var(--text);font-size:11px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 20px}
.toast{position:absolute;left:50%;bottom:52px;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:11px;font-weight:700;padding:7px 14px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style></head><body>
<div class="wrap">
  <div class="head" id="head" onclick="cycle()">
    <div class="hint" id="hint"></div>
    <div class="pic" id="pic">–</div>
    <div>
      <div class="handle" id="handle">@…</div>
      <div class="meta" id="meta">loading…</div>
    </div>
  </div>
  <div class="tabs"><span class="on">GRID PLANNER</span><span>DRAFTS</span></div>
  <div class="scroll" id="scroll"></div>
  <div class="foot">
    <span class="grow" id="status">Drag a row to reorder · numbers = Grid Order</span>
    <button class="btn" id="resetBtn" onclick="resetOrder()">Reset</button>
    <button class="btn p" id="copyBtn" onclick="copyOrder()">Copy order</button>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
const JSSRC="https://wcstudios.github.io/wcs-widgets/draft-grid.js";
const STATSSRC="https://wcstudios.github.io/wcs-widgets/ig-stats.js";
const ACCTS=["wcstudios.co","lifeofbennyy"];
const INIT={"wcstudios.co":"W","lifeofbennyy":"B"};
let raw=null, acct=0, rows=[]; // rows = working order for current account
const $=id=>document.getElementById(id);

function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1400);}

function itemsFor(a){return ((raw&&raw.items)||[]).filter(x=>(x.account||"wcstudios.co")===a);}

function render(){
  const a=ACCTS[acct];
  const pic=$('pic');
  const pp=(window.IGDATA&&window.IGDATA[a]&&window.IGDATA[a].profilePic)||null;
  if(pp){pic.style.backgroundImage="url('"+pp+"')";pic.style.backgroundSize="cover";pic.style.backgroundPosition="center";pic.textContent="";}
  else{pic.style.backgroundImage="";pic.textContent=INIT[a]||a[0].toUpperCase();}
  $('handle').textContent="@"+a;
  $('hint').textContent="tap to switch ▸";
  const n=rows.length;
  $('meta').innerHTML="<b>"+n+"</b> draft grid post"+(n===1?"":"s")+" &nbsp;·&nbsp; plan the feed";
  const sc=$('scroll');
  if(!n){sc.innerHTML='<div class="empty">No draft grid posts for this account.<br>Set a post’s type to <b>IG Grid Post</b> and it’ll show up here.</div>';return;}
  sc.innerHTML=rows.map((it,i)=>{
    const gnum=rows.length-i; // top row = highest number (most recent), bottom = 1
    const tiles=(it.tiles||[]).slice(0,3);
    const cells=[0,1,2].map(k=>{
      const u=tiles[k];
      return '<div class="cell">'+(u?'<img src="'+u+'" referrerpolicy="no-referrer" alt="">':'<span class="ph"></span>')+
        (k===0?'<div class="badge">'+gnum+'</div>':'')+
        (k===0?'<div class="rlabel">'+esc(it.title||'')+'</div>':'')+'</div>';
    }).join('');
    return '<div class="row" draggable="true" data-i="'+i+'">'+cells+
      '<div class="moves"><button class="mv" onclick="move('+i+',-1)" '+(i===0?'disabled':'')+'>▲</button>'+
      '<button class="mv" onclick="move('+i+',1)" '+(i===n-1?'disabled':'')+'>▼</button></div></div>';
  }).join('');
  wireDrag();
  sizeCells();
  const changed=rows.some((it,i)=>(it.order)!==(rows.length-i));
  $('status').textContent=changed?"Order changed — set each post’s Grid Order to match the numbers":"Drag a row to reorder · 1 = bottom, newest on top";
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function sizeCells(){requestAnimationFrame(()=>{document.querySelectorAll('#scroll .cell').forEach(c=>{const w=c.clientWidth;if(w)c.style.height=Math.round(w*1.25)+'px';});});}
let _ro;function watchResize(){if(_ro)return;try{_ro=new ResizeObserver(()=>sizeCells());_ro.observe($('scroll'));}catch(_){window.addEventListener('resize',sizeCells);}}

function move(i,d){const j=i+d;if(j<0||j>=rows.length)return;const t=rows[i];rows[i]=rows[j];rows[j]=t;persist();render();}

let dragI=null;
function wireDrag(){
  [...document.querySelectorAll('.row')].forEach(el=>{
    el.addEventListener('dragstart',e=>{dragI=+el.dataset.i;el.classList.add('drag');try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','');}catch(_){}});
    el.addEventListener('dragend',()=>{dragI=null;[...document.querySelectorAll('.row')].forEach(r=>r.classList.remove('drag','over'));});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('over');});
    el.addEventListener('dragleave',()=>el.classList.remove('over'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('over');const to=+el.dataset.i;if(dragI==null||dragI===to)return;const it=rows.splice(dragI,1)[0];rows.splice(to,0,it);persist();render();});
  });
}

function keyFor(a){return "wcsgrid:"+a;}
function persist(){try{localStorage.setItem(keyFor(ACCTS[acct]),JSON.stringify(rows.map(r=>r.pageId)));}catch(_){}}
function loadOrder(a){
  const base=itemsFor(a);
  let saved=null;try{saved=JSON.parse(localStorage.getItem(keyFor(a))||"null");}catch(_){}
  if(saved&&Array.isArray(saved)){
    const byId=Object.fromEntries(base.map(x=>[x.pageId,x]));
    const ordered=saved.map(id=>byId[id]).filter(Boolean);
    base.forEach(x=>{if(!saved.includes(x.pageId))ordered.unshift(x);}); // new posts to top (newest)
    return ordered;
  }
  // Highest Grid Order (newest) on top; unnumbered posts float to the very top.
  return base.slice().sort((x,y)=>((y.order??1e18)-(x.order??1e18)));
}
function resetOrder(){try{localStorage.removeItem(keyFor(ACCTS[acct]));}catch(_){}rows=loadOrder(ACCTS[acct]);render();toast("Reset to saved order");}
function copyOrder(){
  const lines=rows.map((it,i)=>(rows.length-i)+"  "+(it.title||it.pageId));
  const txt="Grid Order (top = newest):\n"+lines.join("\n");
  try{navigator.clipboard.writeText(txt);toast("Order copied");}catch(_){toast("Copy failed");}
}
function cycle(){acct=(acct+1)%ACCTS.length;rows=loadOrder(ACCTS[acct]);render();}

function apply(){rows=loadOrder(ACCTS[acct]);render();}
function loadStats(){const s=document.createElement('script');s.src=STATSSRC+"?t="+Date.now();s.onload=()=>{render();s.remove();};s.onerror=()=>s.remove();document.head.appendChild(s);}
function load(){const s=document.createElement('script');s.src=JSSRC+"?t="+Date.now();s.onload=()=>{raw=window.DRAFTGRID;apply();s.remove();};s.onerror=()=>{$('meta').textContent="feed offline";s.remove();};document.head.appendChild(s);}
load();loadStats();watchResize();setInterval(()=>{load();loadStats();},300000);
</script></body></html>
