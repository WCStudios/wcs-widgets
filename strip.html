<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>IG Stats Strip</title>
<style>
:root{--bg:#fff;--line:#ececec;--text:#111;--muted:#8a8a8a;--accent:#e8622c;--soft:#f2f2f2;--up:#16a34a;--down:#dc2626}
@media (prefers-color-scheme:dark){:root{--bg:#171717;--line:#2a2a2a;--text:#f4f4f4;--muted:#8a8a8a;--soft:#262626}}
*{margin:0;box-sizing:border-box}html,body{height:100%;width:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--text)}
.strip{display:flex;height:100%;width:100%;overflow-x:auto}
.panel{flex:1 1 0;min-width:190px;padding:clamp(14px,1.6vw,22px);border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;position:relative;cursor:pointer}
.panel:last-child{border-right:none}
.k{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.who{font-size:12px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.big{font-size:clamp(26px,3.2vw,44px);font-weight:800;letter-spacing:-1.5px;line-height:1;margin-top:10px}
.sub{font-size:11px;color:var(--muted);margin-top:6px}
.row{display:flex;gap:20px;margin-top:12px}.n{font-size:15px;font-weight:800}.nl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.top{display:flex;align-items:center;gap:10px}.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;background:var(--soft);flex:0 0 auto}
.chips{display:flex;gap:5px;margin:8px 0 2px;flex-wrap:wrap}.chip{font-size:10px;padding:3px 8px;border-radius:14px;background:var(--soft);color:var(--muted)}.chip.on{background:var(--accent);color:#fff}
.delta{font-size:12px;font-weight:700;margin-top:6px}.delta.up{color:var(--up)}.delta.down{color:var(--down)}.delta.flat{color:var(--muted)}
.spark{height:32px;margin-top:8px}
.tp{display:flex;gap:14px;align-items:flex-start}.thumb{width:clamp(76px,7vw,108px);aspect-ratio:1;border-radius:12px;object-fit:cover;background:var(--soft);flex:0 0 auto}
.cap{font-size:11.5px;line-height:1.35;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bars{display:flex;align-items:flex-end;gap:2px;height:clamp(34px,4vw,52px);margin-top:12px}.bar{flex:1;background:var(--soft);border-radius:2px 2px 0 0;min-height:2px}.bar.peak{background:var(--accent)}
.axis{display:flex;justify-content:space-between;font-size:8px;color:var(--muted);margin-top:4px}
.hint{position:absolute;top:12px;right:14px;font-size:9px;color:var(--muted)}
</style></head><body>
<div class="strip">
  <!-- Followers -->
  <div class="panel" id="pFollow" onclick="cycleAcct()">
    <div class="hint" id="hint1"></div>
    <div class="top"><div class="av" id="av">–</div><div><div class="who" id="handle">@…</div><div class="k" id="sub1">loading</div></div></div>
    <div class="big" id="followers">—</div><div class="k">Followers</div>
    <div class="row"><div><div class="n" id="posts">—</div><div class="nl">Posts</div></div><div><div class="n" id="following">—</div><div class="nl">Following</div></div></div>
  </div>
  <!-- Growth -->
  <div class="panel" id="pGrowth">
    <div class="k">Follower growth</div>
    <div class="chips" id="chips"></div>
    <div class="big" id="gFollowers">—</div>
    <div class="delta flat" id="delta">—</div>
    <svg class="spark" id="spark" width="100%" viewBox="0 0 220 32" preserveAspectRatio="none"></svg>
  </div>
  <!-- Top post -->
  <div class="panel" id="pTop" onclick="openPost()">
    <div class="hint" id="hint3"></div>
    <div class="k">Top recent post</div>
    <div class="tp" style="margin-top:10px">
      <img class="thumb" id="thumb" alt="" referrerpolicy="no-referrer">
      <div style="min-width:0;flex:1">
        <div class="big" id="likes" style="font-size:clamp(22px,2.6vw,34px);line-height:1">—</div>
        <div class="k" id="tpsub" style="margin-top:3px">likes</div>
        <div class="cap" id="cap" style="margin-top:7px;-webkit-line-clamp:3">loading…</div>
      </div>
    </div>
  </div>
  <!-- Best time -->
  <div class="panel" id="pTime" onclick="cycleAcct()">
    <div class="hint" id="hint4"></div>
    <div class="k">Best time to post</div>
    <div class="big" id="best">—</div>
    <div class="sub" id="sub4">based on recent engagement</div>
    <div class="bars" id="bars"></div>
    <div class="axis"><span>12a</span><span>6a</span><span>12p</span><span>6p</span><span>11p</span></div>
  </div>
</div>
<script>
const JSSRC="https://wcstudios.github.io/wcs-widgets/ig-stats.js";
const META={"wcstudios.co":{av:"W",c:"#e8622c",sub:"WCStudios · Production + Post"},"lifeofbennyy":{av:"B",c:"#3b82f6",sub:"Bennett · Personal"}};
const RANGES=[30,60,90,365],LBL={30:"30d",60:"60d",90:"90d",365:"1y"};
let data=null,accts=[],ai=0,ri=0;
const fmt=n=>Number(n||0).toLocaleString("en-US");
function fmtH(h){if(h==null)return "—";const ap=h<12?"AM":"PM";let hr=h%12;if(hr===0)hr=12;return hr+" "+ap;}
function render(){if(!data)return;const a=accts[ai],d=data[a]||{},m=META[a]||{av:(a[0]||"?").toUpperCase(),c:"#e8622c",sub:""};
 const sw=accts.length>1?"tap to switch ▸":"";hint1.textContent=sw;hint4.textContent=sw;
 // followers
 if(d.profilePic){av.style.backgroundImage="url('"+d.profilePic+"')";av.style.backgroundSize="cover";av.style.backgroundPosition="center";av.textContent="";}
 else{av.style.backgroundImage="";av.textContent=m.av;av.style.color=m.c;}
 handle.textContent="@"+a;sub1.textContent=m.sub;
 followers.textContent=fmt(d.followers);posts.textContent=fmt(d.mediaCount);following.textContent=fmt(d.following);
 // growth
 gFollowers.textContent=fmt(d.followers);
 chips.innerHTML=RANGES.map((r,x)=>'<span class="chip '+(x===ri?'on':'')+'" onclick="setR(event,'+x+')">'+LBL[r]+'</span>').join('');
 const g=(d.growth||{})[String(RANGES[ri])];
 if(g==null){delta.className="delta flat";delta.textContent="Collecting — builds daily";}
 else{const s=g>0?"+":"";delta.className="delta "+(g>0?"up":g<0?"down":"flat");delta.textContent=s+fmt(g)+" in "+LBL[RANGES[ri]];}
 const hist=(d.history||[]),cut=Date.now()-RANGES[ri]*86400000,pts=hist.filter(h=>new Date(h.date).getTime()>=cut);
 if(pts.length>1){const ys=pts.map(p=>p.followers),mn=Math.min(...ys),mx=Math.max(...ys),rg=mx-mn||1;
  spark.innerHTML='<path d="'+pts.map((p,x)=>{const px=x/(pts.length-1)*220,py=32-((p.followers-mn)/rg)*28-2;return (x?"L":"M")+px.toFixed(1)+" "+py.toFixed(1);}).join(" ")+'" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';}
 else spark.innerHTML='';
 // top post
 const t=d.topPost;hint3.textContent=sw;
 if(t){
   if(t.thumb){thumb.src=t.thumb;thumb.style.display="";}else thumb.style.display="none";
   likes.textContent=fmt(t.likes);
   tpsub.innerHTML="Likes &nbsp;·&nbsp; "+fmt(t.comments)+" comments";
   cap.textContent=t.caption||"(no caption)";
 }else{likes.textContent="—";tpsub.textContent="likes";cap.textContent="No recent posts";thumb.style.display="none";}
 // best time
 best.textContent=d.bestHour!=null?fmtH(d.bestHour):"Collecting…";
 const hourly=d.hourly||[],peak=d.bestHour,H=document.getElementById('bars').clientHeight||46;
 bars.innerHTML=Array.from({length:24},(_,h)=>'<div class="bar '+(h===peak?'peak':'')+'" style="height:'+Math.max(2,(hourly[h]||0)/100*H)+'px"></div>').join('');
 sub4.textContent=d.bestHour!=null?"Central time · recent posts":"Needs a few posts";}
function setR(e,x){e&&e.stopPropagation();ri=x;render();}
function cycleAcct(){if(accts.length>1){ai=(ai+1)%accts.length;render();}}
function openPost(){const t=(data[accts[ai]]||{}).topPost;if(t&&t.permalink)window.open(t.permalink,"_blank");}
function apply(d){if(!d)return;data=d;accts=(d.accounts||Object.keys(d).filter(k=>d[k]&&d[k].followers!=null));render();}
function load(){const s=document.createElement('script');s.src=JSSRC+"?t="+Date.now();s.onload=()=>{apply(window.IGDATA);s.remove();};s.onerror=()=>{sub1.textContent="feed offline";s.remove();};document.head.appendChild(s);}
load();setInterval(load,300000);window.addEventListener('resize',render);
</script></body></html>
