<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>IG Preview</title>
<style>
:root{--bg:#fff;--line:#ececec;--text:#111;--muted:#8a8a8a;--accent:#e8622c;--soft:#f0f0f0}
@media (prefers-color-scheme:dark){:root{--bg:#171717;--line:#2a2a2a;--text:#f4f4f4;--muted:#8a8a8a;--soft:#262626}}
*{margin:0;box-sizing:border-box}html,body{height:100%;width:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--text)}
.wrap{height:100%;display:flex;flex-direction:column;padding:0}
.head{display:flex;align-items:center;gap:14px;cursor:pointer;position:relative;padding:clamp(12px,2vw,18px) clamp(12px,2vw,18px) 0}
.pic{width:clamp(48px,8vw,64px);aspect-ratio:1;border-radius:50%;object-fit:cover;background:var(--soft);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent)}
.handle{font-size:clamp(15px,2.6vw,19px);font-weight:700}
.meta{font-size:12px;color:var(--muted);margin-top:3px}
.meta b{color:var(--text)}
.hint{position:absolute;top:0;right:0;font-size:10px;color:var(--muted)}
.tabs{display:flex;gap:26px;justify-content:center;border-top:1px solid var(--line);margin:14px clamp(12px,2vw,18px) 0;padding-top:10px;font-size:11px;letter-spacing:1px;color:var(--muted)}
.tabs .on{color:var(--text);font-weight:700;border-top:2px solid var(--text);margin-top:-11px;padding-top:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:10px;overflow-y:auto;flex:1}
.cell{position:relative;aspect-ratio:4/5;background:var(--soft);overflow:hidden;cursor:pointer}
.pin{position:absolute;top:5px;right:5px;z-index:3;background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:2px 5px;border-radius:6px;pointer-events:none}
.cell img{width:100%;height:100%;object-fit:cover;display:block}
.cell .ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:12px;color:#fff;font-size:12px;font-weight:700;opacity:0;background:rgba(0,0,0,.4);transition:opacity .15s}
.cell:hover .ov{opacity:1}
.empty{color:var(--muted);font-size:13px;text-align:center;margin-top:20px}
</style></head><body>
<div class="wrap">
  <div class="head" id="head" onclick="cycle()">
    <div class="hint" id="hint"></div>
    <div class="pic" id="pic">–</div>
    <div>
      <div class="handle" id="handle">@…</div>
      <div class="meta" id="meta">loading…</div>
    </div>
  </div>
  <div class="tabs"><span class="on">GRID</span><span>REELS</span><span>TAGGED</span></div>
  <div class="grid" id="grid"></div>
</div>
<script>
const JSSRC="https://wcstudios.github.io/wcs-widgets/ig-stats.js";
let data=null,accts=[],i=0;
const fmt=n=>Number(n||0).toLocaleString("en-US");
function render(){if(!data)return;const a=accts[i],d=data[a]||{};
 const pic=document.getElementById('pic');
 if(d.profilePic){pic.style.backgroundImage="url('"+d.profilePic+"')";pic.style.backgroundSize="cover";pic.style.backgroundPosition="center";pic.textContent="";}
 else{pic.style.backgroundImage="";pic.textContent=(a[0]||"?").toUpperCase();}
 handle.textContent=a;
 meta.innerHTML="<b>"+fmt(d.mediaCount)+"</b> posts &nbsp;·&nbsp; <b>"+fmt(d.followers)+"</b> followers &nbsp;·&nbsp; Instagram";
 hint.textContent=accts.length>1?"tap to switch ▸":"";
 const g=d.grid||[];
 if(!g.length){grid.innerHTML='<div class="empty" style="grid-column:1/4">No recent posts</div>';return;}
 grid.innerHTML=g.map(p=>'<div class="cell" onclick="window.open(\''+(p.permalink||'#')+'\',\'_blank\')">'+
   (p.thumb?'<img src="'+p.thumb+'" referrerpolicy="no-referrer" alt="">':'')+
   (p.pinned?'<div class="pin">📌</div>':'')+
   '<div class="ov">♥ '+fmt(p.likes)+' &nbsp; 💬 '+fmt(p.comments)+'</div></div>').join('');}
function cycle(){if(accts.length>1){i=(i+1)%accts.length;render();}}
function apply(d){if(!d)return;data=d;accts=(d.accounts||Object.keys(d).filter(k=>d[k]&&d[k].followers!=null));render();}
function load(){const s=document.createElement('script');s.src=JSSRC+"?t="+Date.now();s.onload=()=>{apply(window.IGDATA);s.remove();};s.onerror=()=>{meta.textContent="feed offline";s.remove();};document.head.appendChild(s);}
load();setInterval(load,300000);
</script></body></html>
