<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>IG Live Grid</title>
<style>
:root{--bg:#fff;--line:#ececec;--text:#111;--muted:#8a8a8a;--accent:#e8622c;--soft:#f0f0f0}
@media (prefers-color-scheme:dark){:root{--bg:#171717;--line:#2a2a2a;--text:#f4f4f4;--muted:#8a8a8a;--soft:#262626}}
*{margin:0;box-sizing:border-box}html,body{height:100%;width:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--text)}
.wrap{height:100%;display:flex;flex-direction:column;padding:0}
.head{display:flex;align-items:center;gap:14px;cursor:pointer;position:relative;padding:clamp(12px,2vw,18px) clamp(12px,2vw,18px) 0}
.pic{width:clamp(48px,8vw,64px);aspect-ratio:1;border-radius:50%;object-fit:cover;background:var(--soft);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent)}
.handle{font-size:clamp(15px,2.6vw,19px);font-weight:700}
.meta{font-size:12px;color:var(--muted);margin-top:3px}
.meta b{color:var(--text)}
.hint{position:absolute;top:0;right:0;font-size:10px;color:var(--muted)}
.tabs{display:flex;gap:26px;justify-content:center;border-top:1px solid var(--line);margin:14px clamp(12px,2vw,18px) 0;padding-top:10px;font-size:11px;letter-spacing:1px;color:var(--muted)}
.tabs span{cursor:pointer}
.tabs .on{color:var(--text);font-weight:700;border-top:2px solid var(--text);margin-top:-11px;padding-top:10px}
.mv{position:absolute;top:5px;left:5px;z-index:4;width:24px;height:24px;border:none;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s,background .12s}
.cell:hover .mv{opacity:1}
.mv:hover{background:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:10px;overflow-y:auto;align-content:start;grid-auto-rows:max-content;flex:1}
.cell{position:relative;overflow:hidden;background:var(--soft);cursor:pointer;height:120px}
.cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.pin{position:absolute;top:5px;right:5px;z-index:4;width:24px;height:24px;border:none;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s,background .12s}
.cell:hover .pin{opacity:1}
.pin.on{opacity:1;background:var(--accent)}
.ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:12px;color:#fff;font-size:12px;font-weight:700;opacity:0;background:rgba(0,0,0,.4);transition:opacity .15s;z-index:2}
.cell:hover .ov{opacity:1}
.foot{display:none;border-top:1px solid var(--line);padding:8px clamp(12px,2vw,18px);align-items:center;gap:10px;font-size:11px;color:var(--muted)}
.foot.show{display:flex}
.foot .grow{flex:1}
.btn{border:1px solid var(--line);background:var(--soft);color:var(--text);font-size:11px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
.empty{color:var(--muted);font-size:13px;text-align:center;margin-top:20px}
.toast{position:absolute;left:50%;bottom:52px;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:11px;font-weight:700;padding:7px 14px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9}
.toast.show{opacity:1}
</style></head><body>
<div class="wrap">
  <div class="head" id="head" onclick="cycle()">
    <div class="hint" id="hint"></div>
    <div class="pic" id="pic">–</div>
    <div>
      <div class="handle" id="handle">@…</div>
      <div class="meta" id="meta">loading…</div>
    </div>
  </div>
  <div class="tabs"><span id="tabGrid" class="on" onclick="setTab('grid')">GRID</span><span id="tabReels" onclick="setTab('reels')">REELS</span></div>
  <div class="grid" id="grid"></div>
  <div class="foot" id="foot">
    <span class="grow" id="pinstatus"></span>
    <button class="btn" id="clearBtn" onclick="clearPins()">Clear</button>
    <button class="btn p" onclick="copyPins()">Copy pins</button>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
const JSSRC="https://wcstudios.github.io/wcs-widgets/ig-stats.js";
let data=null,accts=[],i=0;
const fmt=n=>Number(n||0).toLocaleString("en-US");
const $=id=>document.getElementById(id);
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1400);}

function pinKey(a){return "wcspin:"+a;}
function localPins(a){try{return new Set(JSON.parse(localStorage.getItem(pinKey(a))||"[]"));}catch(_){return new Set();}}
function savePins(a,set){try{localStorage.setItem(pinKey(a),JSON.stringify([...set]));}catch(_){}}
function togglePin(perm){const a=accts[i],s=localPins(a);if(s.has(perm))s.delete(perm);else s.add(perm);savePins(a,s);render();}
function clearPins(){const a=accts[i];savePins(a,new Set());render();toast("Local pins cleared");}
function copyPins(){
  const a=accts[i],d=data[a]||{},s=localPins(a);
  const feedPins=(d.grid||[]).filter(p=>p.pinned).map(p=>p.permalink);
  const all=[...new Set([...feedPins,...s])].filter(Boolean);
  if(!all.length){toast("No pins to copy");return;}
  const line="PINNED:"+a+"|"+all.join(", ");
  try{navigator.clipboard.writeText(line);toast("Copied — paste into Social Settings");}catch(_){toast("Copy failed");}
}

function render(){if(!data)return;const a=accts[i],d=data[a]||{};
 const pic=$('pic');
 if(d.profilePic){pic.style.backgroundImage="url('"+d.profilePic+"')";pic.style.backgroundSize="cover";pic.style.backgroundPosition="center";pic.textContent="";}
 else{pic.style.backgroundImage="";pic.textContent=(a[0]||"?").toUpperCase();}
 $('handle').textContent=a;
 $('meta').innerHTML="<b>"+fmt(d.mediaCount)+"</b> posts &nbsp;·&nbsp; <b>"+fmt(d.followers)+"</b> followers &nbsp;·&nbsp; Instagram";
 $('hint').textContent=accts.length>1?"tap to switch ▸":"";
 const cls=localClass(a), s=localPins(a);
 const all=(d.grid||[]).map(p=>({...p,_pin:p.pinned||s.has(p.permalink),_reel:isReel(p,cls)}));
 $('tabGrid').className=tab==='grid'?'on':'';
 $('tabReels').className=tab==='reels'?'on':'';
 let list=all.filter(p=>tab==='reels'?p._reel:!p._reel);
 if(tab==='grid'){list=list.map((p,idx)=>({p,idx})).sort((x,y)=>(y.p._pin-x.p._pin)||(x.idx-y.idx)).map(o=>o.p);}
 const grid=$('grid');
 if(!list.length){grid.innerHTML='<div class="empty" style="grid-column:1/4">'+(tab==='reels'?'No reels':'No posts')+'</div>';}
 else{grid.innerHTML=list.map(p=>{
   const perm=(p.permalink||'').replace(/'/g,"%27");
   const moveBtn=tab==='grid'
     ?'<button class="mv" title="Move to Reels" onclick="event.stopPropagation();moveClass(\''+perm+'\',\'reel\')">🎬</button>'
     :'<button class="mv" title="Move to Grid" onclick="event.stopPropagation();moveClass(\''+perm+'\',\'grid\')">⊞</button>';
   const pinBtn=tab==='grid'?'<button class="pin '+(p._pin?'on':'')+'" title="Pin/unpin" onclick="event.stopPropagation();togglePin(\''+perm+'\')">📌</button>':'';
   return '<div class="cell" onclick="open2(\''+perm+'\')">'+
     (p.thumb?'<img loading="lazy" src="'+p.thumb+'" referrerpolicy="no-referrer" alt="">':'<span class="ph"></span>')+
     pinBtn+moveBtn+
     '<div class="ov">♥ '+fmt(p.likes)+' &nbsp; 💬 '+fmt(p.comments)+'</div></div>';
 }).join('');}
 const nPins=all.filter(p=>p._pin&&!p._reel).length;
 $('foot').classList.toggle('show',tab==='grid'&&nPins>0);
 $('pinstatus').innerHTML="📌 <b>"+nPins+"</b> pinned &nbsp;·&nbsp; Copy → paste into Social Settings to save";
 sizeCells();
}
let tab='grid';
function setTab(t){tab=t;render();}
function clsKey(a){return "wcscls:"+a;}
function localClass(a){try{return JSON.parse(localStorage.getItem(clsKey(a))||"{}");}catch(_){return {};}}
function moveClass(perm,target){const a=accts[i],c=localClass(a);c[perm]=target;try{localStorage.setItem(clsKey(a),JSON.stringify(c));}catch(_){}render();}
function isReel(p,cls){const o=cls[p.permalink];if(o)return o==='reel';return p.productType==='REELS';}
// Explicit 4:5 sizing — set each cell's height to its width × 1.25 (bulletproof).
function sizeCells(){requestAnimationFrame(()=>{document.querySelectorAll('#grid .cell').forEach(c=>{const w=c.clientWidth;if(w)c.style.height=Math.round(w*1.25)+'px';});});}
let _ro;
function watchResize(){if(_ro)return;try{_ro=new ResizeObserver(()=>sizeCells());_ro.observe($('grid'));}catch(_){window.addEventListener('resize',sizeCells);}}
function open2(u){if(u&&u!=='#')window.open(u,'_blank');}
function cycle(){if(accts.length>1){i=(i+1)%accts.length;render();}}
function apply(d){if(!d)return;data=d;accts=(d.accounts||Object.keys(d).filter(k=>d[k]&&d[k].followers!=null));render();}
function load(){const s=document.createElement('script');s.src=JSSRC+"?t="+Date.now();s.onload=()=>{apply(window.IGDATA);s.remove();};s.onerror=()=>{$('meta').textContent="feed offline";s.remove();};document.head.appendChild(s);}
load();watchResize();setInterval(load,300000);
</script></body></html>
